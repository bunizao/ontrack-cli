name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/ontrack-cli/
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Verify tag matches package version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          project = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]
          name = project["name"]
          version = project["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          expected = f"v{version}"
          if name != "ontrack-cli":
              raise SystemExit(f"Refusing to publish unexpected package name: {name}")
          if tag != expected:
              raise SystemExit(f"Tag {tag} does not match package version {expected}")
          print(f"Validated release tag {tag} for {name}")
          PY

      - name: Build package
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
